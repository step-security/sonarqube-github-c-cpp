name: 'SonarQube Scan for C and C++'
description: 'Scan your C and C++ code with SonarQube to detect bugs, vulnerabilities and code smells.'
branding:
  icon: check
  color: green
inputs:
  installation-path:
    description: 'Directory where the sonar-scanner and build wrapper will be installed. Created if does not exists.'
    required: false
    default: '.sonar'
  cache-binaries:
    description: 'Controls if installed binaries are cached using GitHub cache.'
    required: false
    default: 'true'

outputs:
  sonar-scanner-binary:
    description: "Absolute path to sonar-scanner binary."
    value: ${{ steps.setup-outputs.outputs.sonar-scanner-binary }}
  build-wrapper-binary:
    description: "Absolute path to build-wrapper binary."
    value: ${{ steps.setup-outputs.outputs.build-wrapper-binary }}

runs:
  using: "composite"
  steps:
    - name: StepSecurity subscription check
      shell: bash
      run: |
        # StepSecurity subscription check
        UPSTREAM="sonarsource/sonarqube-github-c-cpp"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"

        REPO_PRIVATE=""
        if [ -n "$GITHUB_EVENT_PATH" ] && [ -f "$GITHUB_EVENT_PATH" ]; then
          REPO_PRIVATE=$(jq -r '.repository.private' "$GITHUB_EVENT_PATH" 2>/dev/null || true)
        fi

        echo ""
        printf '\033[1;36mStepSecurity Maintained Action\033[0m\n'
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          printf '\033[32m✓ Free for public repositories\033[0m\n'
        fi
        printf '\033[36mLearn more:\033[0m %s\n' "$DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ "$CURL_EXIT_CODE" -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            printf '::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m\n'
            printf '::error::\033[31mLearn how to enable a subscription: %s\033[0m\n' "$DOCS_URL"
            exit 1
          fi
        fi
    - name: SonarQube Scan
      id: scan
      uses: step-security/sonarqube-scan-action/deprecated-c-cpp@7a05660128832531a934215813a17f66ec119efa # v8.2.0
      with:
        installation-path: ${{ inputs.installation-path }}
        cache-binaries: ${{ inputs.cache-binaries }}
    - name: Setup action outputs
      id: setup-outputs
      shell: bash
      env:
        SONAR_SCANNER_BINARY: ${{ steps.scan.outputs.sonar-scanner-binary }}
        BUILD_WRAPPER_BINARY: ${{ steps.scan.outputs.build-wrapper-binary }}
      run: |
        echo "::group::Action outputs"
        echo "sonar-scanner-binary=${SONAR_SCANNER_BINARY}" >> $GITHUB_OUTPUT
        echo "'sonar-scanner-binary' output set to '${SONAR_SCANNER_BINARY}'"

        echo "build-wrapper-binary=${BUILD_WRAPPER_BINARY}" >> $GITHUB_OUTPUT
        echo "'build-wrapper-binary' output set to '${BUILD_WRAPPER_BINARY}'"
        echo "::endgroup::"
